name: demo_medallion CI

on:
  pull_request:
    paths:
      - "demo_medallion/**"
      - "pyproject.toml"
      - ".github/workflows/demo-medallion-ci.yml"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check demo_medallion

      - name: Pytest
        run: pytest
